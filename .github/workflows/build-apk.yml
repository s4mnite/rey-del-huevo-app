name: Build APK

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Java (necesario para Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependencias
        run: npm install

      - name: Compilar la app web (Vite)
        run: npm run build

      - name: Agregar la plataforma Android
        run: npx cap add android

      - name: Generar íconos y splash screen
        run: npx capacitor-assets generate --android

      - name: Sincronizar Capacitor con Android
        run: npx cap sync android

      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew

      - name: Compilar el APK (debug, instalable directo)
        run: cd android && ./gradlew assembleDebug

      - name: Subir el APK como resultado
        uses: actions/upload-artifact@v4
        with:
          name: rey-del-huevo-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
